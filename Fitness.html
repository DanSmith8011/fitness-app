<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
      * {
        box-sizing: border-box;
    }

    article {
        padding: 16px;
        flex: 1;
        border: 1px solid black;
    }

    nav {
        display: flex;
        gap: 16px;
    }
/* base — mobile */
.workout-logs {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

/* 600px and wider — desktop */
@media (min-width: 600px) {
    .workout-logs {
        flex-direction: row;
    }
}
    .layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
    }

@media (min-width: 600px) {
    .layout {
        grid-template-columns: 1fr 3fr;
    }
}


    </style>
</head>
<body>
<header>  
    <nav>

        <a href="#">Home</a>
        <a href="#">Workouts</a>
        
    </nav>

</header>

<main>

    <section>

    </section>
    <div class="layout">
        <aside>
            <p>Sidebar</p>
        </aside>

    <section>
            <form> 
                <label>
                    Workout Name: 
                    <input name="workout-name" id="workout-name" placeholder="Workout Name"/>
                </label>

                <label>
                    Duration:
                    <input name="workout-duration" id="workout-duration" placeholder="Workout Duration"/>
                </label>

                <label>
                    <select id="workout-type" placeholder="Select Type">
                        <option value="">Select type</option>
                        <option value='Strength Training'>Strength</option>
                        <option value='Cardio Training'>Cardio</option>
                    </select>
                </label>
                <button type="button" id="add-workout">Add Workout</button>
            </form>
            
    </section>

    <section class="filter-section">
        <select id="filter-type" placehgolder="Select Type">
            <option value="">Select Type</option>
            <option value="all">All</option>
            <option value="Strength Training">Strength</option>
            <option value="Cardio Training">Cardio</option>
        </select>
        <button id="filter-button">Filter</button>
    </section>

    <section class="workout-logs"></section>
    <button id='clear-workouts'>Clear Workouts</button>
</div>
</main>

<footer>

</footer>
<script>
    const workouts = []
    const workoutName = document.getElementById('workout-name')
    const workoutDuration = document.getElementById('workout-duration')
    const workoutType = document.getElementById('workout-type')
    const addWorkoutButton = document.getElementById('add-workout')
    const workoutLogs = document.querySelector('.workout-logs')
    const filterButton = document.getElementById('filter-button')
    const filterType = document.getElementById('filter-type')

    addWorkoutButton.addEventListener('click', function (e) {
        console.log('button clicked')
        e.preventDefault()
        const newWorkout = {
            name: workoutName.value,
            duration: workoutDuration.value,
            type: workoutType.value
        }
        workouts.push(newWorkout)
        renderWorkouts(workouts)
        console.log(workouts)
        console.log('Hello')
    })

    filterButton.addEventListener('click', function (e){
    const typeOfFilter = filterType.value

    if (typeOfFilter === 'all') {
        renderWorkouts(workouts)
    } else {
    const filteredWorkout = workouts.filter(workout => workout.type === typeOfFilter )
    renderWorkouts(filteredWorkout)
    }
})

    function renderWorkouts(arr) {
        workoutLogs.innerHTML=''
        arr.forEach(workout => {
        const card = document.createElement('article')
        card.innerHTML = `
        <h2>${workout.name}</h2>
        <p>${workout.duration} mins</p>
        <p>${workout.type}</p>
        `
        workoutLogs.appendChild(card)
        
        })
    }

</script>
</body>
</html>
